{% extends "base.html" %}
{% block content %}
<div class="form-wrapper">
<form method="POST">
    <h2>New Message</h2>

    <input  name="to"        placeholder="Recipient username" value="{{ prefill_to }}"      required>
    <input  name="subject"   placeholder="Subject"            value="{{ prefill_subject }}">
    <input  type="hidden"    name="thread_id"                 value="{{ prefill_thread }}">
    <textarea name="body"    placeholder="Write your message here..." required></textarea>

    <button type="submit">Send</button>
    <a class="btn outline" href="/messages">Cancel</a>
</form>
</div>
{% endblock %}
