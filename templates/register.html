{% extends "base.html" %}
{% block content %}
<div class="auth-page">
    <div class="auth-overlay"></div>
    <div class="auth-card auth-card--wide">
        <div class="auth-brand">
            <span class="brand-icon">⚙</span>
            <h1>JobConnect</h1>
        </div>
        <form method="POST" enctype="multipart/form-data">
            <h2>Create Account</h2>
            <p class="auth-sub">Join thousands of workers and employers</p>

            <div class="form-grid">
                <div class="input-group">
                    <span class="input-icon">👤</span>
                    <input name="name" placeholder="Full Name" required>
                </div>
                <div class="input-group">
                    <span class="input-icon">📱</span>
                    <input name="phone" placeholder="Phone Number">
                </div>
                <div class="input-group">
                    <span class="input-icon">🔧</span>
                    <input name="skill" placeholder="Main Skill (e.g. Plumber)">
                </div>
                <div class="input-group">
                    <span class="input-icon">📍</span>
                    <input name="location" placeholder="Location" required>
                </div>
            </div>

            <div class="input-group">
                <span class="input-icon">🔒</span>
                <input type="password" name="password" placeholder="Password" required>
            </div>

            <select name="role" required>
                <option value="">Select Your Role</option>
                <option value="worker">🔧 Worker — I'm looking for jobs</option>
                <option value="employer">💼 Employer — I'm hiring</option>
            </select>

            <label class="file-label" for="profile_pic">
                <span class="file-icon">📷</span> Upload Profile Picture (optional)
            </label>
            <input type="file" id="profile_pic" name="profile_pic" accept="image/*" class="file-input">

            <button type="submit">Create Account</button>
            <p class="auth-link">Already have an account? <a href="/login">Sign in</a></p>
        </form>
    </div>
</div>
{% endblock %}
